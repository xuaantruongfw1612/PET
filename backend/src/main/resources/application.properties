spring.application.name=petcare-system

# ============================================================
# MySQL connection - doc tu ENVIRONMENT VARIABLES, co gia tri
# mac dinh (sau dau ":") de van chay duoc khi test local khong
# set env. Trong Codespaces, docker-compose se tu set cac bien
# nay cho container "app" (xem .devcontainer/docker-compose.yml).
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/petcare_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:petcare_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate tu tao/cap nhat bang dua tren Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${SERVER_PORT:8080}

# Cho phep frontend (file HTML mo truc tiep, hoac forwarded port trong Codespaces) goi API
spring.mvc.cors.allowed-origins=*
